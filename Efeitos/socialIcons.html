<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Isso é um exemplo de ícones sociais com efeitos de sombra e preenchimento.">
        <meta name="keywords" content="ícones sociais, efeitos de sombra, preenchimento, CSS, jQuery">
        <meta name="robots" content="index, follow">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta http-equiv="X-UA-Compatible" content="IE-7">

        <link rel="stylesheet" href="css/style_icons.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
        
        <script src="https://code.jquery.com/jquery-3.4.1.js"></script>

        <title>Icons</title>
    </head>
    <body>
        
        <div class="center">
            <div class="icons first">
                <li><a href="#"><span class="fab fa-facebook-f"></span></a></li>
                <li><a href="#"><span class="fab fa-twitter"></span></a></li>
                <li><a href="#"><span class="fab fa-instagram"></span></a></li>
                <li><a href="#"><span class="fab fa-linkedin-in"></span></a></li>
                <li><a href="#"><span class="fab fa-github"></span></a></li>
            </div>
            <div class="icons second">
                <li><a href="#"><span class="fab fa-facebook-f"></span></a></li>
                <li><a href="#"><span class="fab fa-twitter"></span></a></li>
                <li><a href="#"><span class="fab fa-instagram"></span></a></li>
                <li><a href="#"><span class="fab fa-linkedin-in"></span></a></li>
                <li><a href="#"><span class="fab fa-github"></span></a></li>
            </div>
        </div>
        <script>
            $('.first li').click(function () {
                $(this).toggleClass("shadow-1").siblings();
                $(this).toggleClass("fill-color").siblings();
            });
            $('.second li').click(function () {
                $(this).toggleClass("shadow-2").siblings();
                $(this).toggleClass("fill-color").siblings();
            });
        </script>
    </body>
</html>
