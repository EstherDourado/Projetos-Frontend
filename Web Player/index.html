<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="keywords" content="Musica, Play, Song">
        <meta name="description" content="Site de Musica">
        <meta name="author" content="Esther Dourado Batista">
        <meta name="robots" content="index, follow">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <link rel="stylesheet" href="css/style.css">
        <title>Musica</title>
    </head>
    <body>
        <div class="container">
            <div class="navbar">
                <img src="img/logo.png" class="logo">
                <ul>
                    <li><a href="#">HOME</a></li>
                    <li><a href="#">SOBRE</a></li>
                    <li><a href="#">ESPECIFICAÇÕES</a></li>
                    <li><a href="#">PRODUTOS</a></li>
                    <li><a href="#">CONECTAR</a></li>
                </ul>
            </div>
            <div class="content">
                <div class="left-col">
                    <h1>O SOM <br> REAL</h1>
                </div>
                <div class="right-col">
                    <p>Clique aqui para ouvir</p>
                    <img src="img/play.png" id="icon">
                </div>
            </div>
        </div>

        <audio id="mySong">
            <source src="" type="audio/mp3">
        </audio>

        <script>
         var mySong = document.getElementById("mySong");
         var icon = document.getElementById("icon");

         icon.onclick = function(){
            if(mySong.paused){
                mySong.play();
                icon.src = "img/pause.png";
            }else{
                mySong.pause();
                icon.src = "img/play.png";
            }
         }
        </script>
    </body>
</html>
