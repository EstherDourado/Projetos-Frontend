<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="keywords" content="Tecnologia, Colaboradores, Projeto, Equipa">
        <meta name="description" content="Conheça os desenvolvedores e colaboradores do projeto">
        <meta name="author" content="Esther Dourado Batista">
        <meta name="robots" content="index, follow">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">

        <link rel="stylesheet" href="style_skillsbar.css">

        <title>Skill bar</title>
    </head>
    <body>
        <section class="container">
            <div class="skill-box">
                <span class="title">C# .Net</span>

                <div class="skill-bar">
                    <span class="skill-per csharp">
                        <span class="tooltip">90%</span>
                    </span>
                </div>
            </div>
            
            <div class="skill-box">
                <span class="title">JavaScript</span>

                <div class="skill-bar">
                    <span class="skill-per javascript">
                        <span class="tooltip">60%</span>
                    </span>
                </div>
            </div>

            <div class="skill-box">
                <span class="title">java</span>

                <div class="skill-bar">
                    <span class="skill-per java">
                        <span class="tooltip">50%</span>
                    </span>
                </div>
            </div>

            <div class="skill-box">
                <span class="title">Python</span>

                <div class="skill-bar">
                    <span class="skill-per python">
                        <span class="tooltip">90%</span>
                    </span>
                </div>
            </div>
        </section>
    </body>
</html>
